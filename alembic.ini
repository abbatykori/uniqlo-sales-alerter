# Alembic configuration.
#
# The script_location points at the migrations directory under the package.
# sqlalchemy.url is intentionally blank — env.py resolves it from the same
# ALERTER_DB_PATH environment variable that the runtime engine uses.

[alembic]
script_location = src/uniqlo_sales_alerter/db/migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
