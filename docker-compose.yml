services:
  uniqlo-alerter:
    # replaced with ghcr.io/<owner>/uniqlo-sales-alerter at step 17 of the fork build
    image: kequach/uniqlo-sales-alerter:latest
    container_name: uniqlo-alerter
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - alerter-state:/app/data
    environment:
      - ALERTER_SECRET=${ALERTER_SECRET:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  alerter-state:
