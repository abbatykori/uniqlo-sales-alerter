<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Uniqlo Sales Alerter{% endblock %}</title>
    <link rel="stylesheet" href="/static/tokens.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous"></script>
    <script>
      // Hook design-token CSS variables into Tailwind's theme palette so we
      // can use classes like text-text-primary / bg-surface-canvas.
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas:   'var(--color-surface-canvas)',
              raised:   'var(--color-surface-raised)',
              sunken:   'var(--color-surface-sunken)',
              text: {
                primary:   'var(--color-text-primary)',
                secondary: 'var(--color-text-secondary)',
                muted:     'var(--color-text-muted)',
                inverse:   'var(--color-text-inverse)',
              },
              border: {
                default: 'var(--color-border-default)',
                strong:  'var(--color-border-strong)',
              },
              accent: {
                DEFAULT: 'var(--color-accent-primary)',
                muted:   'var(--color-accent-primary-muted)',
              },
              status: {
                success: 'var(--color-status-success)',
                warning: 'var(--color-status-warning)',
                error:   'var(--color-status-error)',
                info:    'var(--color-status-info)',
              },
            },
            borderRadius: {
              card: 'var(--radius-md)',
              pill: 'var(--radius-full)',
            },
            fontFamily: {
              serif: ['"Noto Serif"', 'ui-serif', 'Georgia', 'serif'],
              sans:  ['"Noto Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono:  ['"Noto Sans Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&family=Noto+Serif:wght@400;500;700&family=Noto+Sans+Mono&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Noto Sans', ui-sans-serif, system-ui, sans-serif; background: var(--color-surface-canvas); color: var(--color-text-primary); }
      h1, h2, h3 { font-family: 'Noto Serif', ui-serif, Georgia, serif; }
    </style>
</head>
<body class="min-h-full">
    <div class="flex min-h-screen flex-col md:flex-row">
        {# Desktop sidebar #}
        <aside class="hidden md:flex md:w-56 md:flex-col md:border-r md:border-border-default md:bg-raised md:px-4 md:py-6">
            <a href="/" class="font-serif text-lg font-medium text-text-primary mb-6">Uniqlo Alerter</a>
            <nav class="flex flex-col gap-1 text-sm">
                <a href="/" class="flex items-center gap-2 rounded px-3 py-2 hover:bg-sunken">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M232 96H160V40a24 24 0 0 0-24-24H120a24 24 0 0 0-24 24v56H24a8 8 0 0 0-8 8v112a16 16 0 0 0 16 16h192a16 16 0 0 0 16-16V104a8 8 0 0 0-8-8Zm-72-56h-16v56h16ZM32 216V112h208v104H32Z"/></svg>
                    Deals
                </a>
                <a href="/filters" class="flex items-center gap-2 rounded px-3 py-2 hover:bg-sunken">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M230.6 49.5A8 8 0 0 0 224 40H32a8 8 0 0 0-6.6 12.5l72 96V216a8 8 0 0 0 11.6 7.2l32-16a8 8 0 0 0 4.4-7.2v-51.3l72-96A8 8 0 0 0 230.6 49.5Z"/></svg>
                    Filters
                </a>
                <a href="/inbox" class="flex items-center gap-2 rounded px-3 py-2 hover:bg-sunken">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M224 48H32a8 8 0 0 0-8 8v144a16 16 0 0 0 16 16h176a16 16 0 0 0 16-16V56a8 8 0 0 0-8-8Z"/></svg>
                    Inbox
                </a>
                <a href="/insights" class="flex items-center gap-2 rounded px-3 py-2 hover:bg-sunken">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M224 200H32V56a8 8 0 0 0-16 0v152a8 8 0 0 0 8 8h200a8 8 0 0 0 0-16Z"/></svg>
                    Insights
                </a>
                <hr class="my-2 border-border-default">
                <a href="/settings" class="rounded px-3 py-2 hover:bg-sunken text-text-secondary">Settings</a>
                <a href="/help" class="rounded px-3 py-2 hover:bg-sunken text-text-secondary">Help</a>
            </nav>

            <div class="mt-auto pt-6"
                 hx-get="/status-pill"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
                <span class="text-xs text-text-muted">Loading status...</span>
            </div>
        </aside>

        {# Main content #}
        <main class="flex-1 px-4 py-6 md:px-8 md:py-8 pb-28 md:pb-8">
            {% block content %}{% endblock %}
        </main>

        {# Mobile bottom tab bar #}
        <nav class="md:hidden fixed bottom-0 inset-x-0 z-10 border-t border-border-default bg-raised">
            <div class="flex justify-around text-xs text-text-secondary">
                <a href="/" class="flex-1 py-2 text-center">
                    <div class="mx-auto w-5 h-5">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256"><path d="M232 96H160V40a24 24 0 0 0-24-24H120a24 24 0 0 0-24 24v56H24a8 8 0 0 0-8 8v112a16 16 0 0 0 16 16h192a16 16 0 0 0 16-16V104a8 8 0 0 0-8-8Z"/></svg>
                    </div>
                    Deals
                </a>
                <a href="/filters" class="flex-1 py-2 text-center">
                    <div class="mx-auto w-5 h-5">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256"><path d="M230.6 49.5A8 8 0 0 0 224 40H32a8 8 0 0 0-6.6 12.5l72 96V216a8 8 0 0 0 11.6 7.2l32-16a8 8 0 0 0 4.4-7.2v-51.3l72-96A8 8 0 0 0 230.6 49.5Z"/></svg>
                    </div>
                    Filters
                </a>
                <a href="/inbox" class="flex-1 py-2 text-center">
                    <div class="mx-auto w-5 h-5">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256"><path d="M224 48H32a8 8 0 0 0-8 8v144a16 16 0 0 0 16 16h176a16 16 0 0 0 16-16V56a8 8 0 0 0-8-8Z"/></svg>
                    </div>
                    Inbox
                </a>
                <a href="/insights" class="flex-1 py-2 text-center">
                    <div class="mx-auto w-5 h-5">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256"><path d="M224 200H32V56a8 8 0 0 0-16 0v152a8 8 0 0 0 8 8h200a8 8 0 0 0 0-16Z"/></svg>
                    </div>
                    Insights
                </a>
                <a href="/settings" class="flex-1 py-2 text-center">
                    <div class="mx-auto w-5 h-5">…</div>
                    More
                </a>
            </div>
            <div class="px-3 pb-1 pt-0 text-center"
                 hx-get="/status-pill"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
                <span class="text-xs text-text-muted">Loading status...</span>
            </div>
        </nav>
    </div>
    {% include "_modal.html" %}
</body>
</html>
