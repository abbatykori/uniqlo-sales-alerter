<span style="margin-left:6px;padding:4px 6px;border:1px solid #ccc;border-radius:4px;background:#fffbe6">
    Snooze for:
    {% for label, duration in [("1d", "1d"), ("7d", "7d"), ("30d", "30d"), ("forever", "forever")] %}
        <button type="button"
                hx-post="/filters/{{ filter_id }}/snooze"
                hx-vals='{"duration": "{{ duration }}"}'
                hx-target="#filter-row-{{ filter_id }}"
                hx-swap="outerHTML"
                style="margin-left:4px">{{ label }}</button>
    {% endfor %}
</span>
